<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">1927—1936年上海工人生活费与货币购买力指数</title>
  <desc id="desc">以1926年为100。生活费指数在1930年升至116.79，随后回落；货币购买力指数与其反向变动。</desc>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="600" fill="#1f2937">1927—1936年上海工人生活费与货币购买力指数</text>
  <text x="480" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13" fill="#6b7280">1926年＝100；货币购买力指数＝10000 ÷ 生活费指数</text>

  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="76" y1="70" x2="925" y2="70"/>
    <line x1="76" y1="160" x2="925" y2="160"/>
    <line x1="76" y1="250" x2="925" y2="250"/>
    <line x1="76" y1="340" x2="925" y2="340"/>
    <line x1="76" y1="430" x2="925" y2="430"/>
  </g>
  <g fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="12">
    <text x="62" y="74" text-anchor="end">120</text>
    <text x="62" y="164" text-anchor="end">110</text>
    <text x="62" y="254" text-anchor="end">100</text>
    <text x="62" y="344" text-anchor="end">90</text>
    <text x="62" y="434" text-anchor="end">80</text>
  </g>
  <line x1="76" y1="430" x2="925" y2="430" stroke="#9ca3af" stroke-width="1.2"/>
  <line x1="76" y1="70" x2="76" y2="430" stroke="#9ca3af" stroke-width="1.2"/>

  <g fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="12" text-anchor="middle">
    <text x="100" y="454">1927</text><text x="190" y="454">1928</text>
    <text x="280" y="454">1929</text><text x="370" y="454">1930</text>
    <text x="460" y="454">1931</text><text x="550" y="454">1932</text>
    <text x="640" y="454">1933</text><text x="730" y="454">1934</text>
    <text x="820" y="454">1935</text><text x="910" y="454">1936</text>
  </g>

  <polyline points="100,240.2 190,311.1 280,232.2 370,98.9 460,125.6 550,177.6 640,275.5 730,273.9 820,261.5 910,204.6" fill="none" stroke="#b45309" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="100,259.7 190,184.5 280,267.5 370,379.4 460,359.3 550,317.0 640,223.8 730,225.5 820,238.3 910,293.2" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#b45309">
    <circle cx="100" cy="240.2" r="4"/><circle cx="190" cy="311.1" r="4"/><circle cx="280" cy="232.2" r="4"/><circle cx="370" cy="98.9" r="4"/><circle cx="460" cy="125.6" r="4"/><circle cx="550" cy="177.6" r="4"/><circle cx="640" cy="275.5" r="4"/><circle cx="730" cy="273.9" r="4"/><circle cx="820" cy="261.5" r="4"/><circle cx="910" cy="204.6" r="4"/>
  </g>
  <g fill="#1d4ed8">
    <circle cx="100" cy="259.7" r="4"/><circle cx="190" cy="184.5" r="4"/><circle cx="280" cy="267.5" r="4"/><circle cx="370" cy="379.4" r="4"/><circle cx="460" cy="359.3" r="4"/><circle cx="550" cy="317.0" r="4"/><circle cx="640" cy="223.8" r="4"/><circle cx="730" cy="225.5" r="4"/><circle cx="820" cy="238.3" r="4"/><circle cx="910" cy="293.2" r="4"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">
    <line x1="314" y1="493" x2="346" y2="493" stroke="#b45309" stroke-width="3"/><circle cx="330" cy="493" r="4" fill="#b45309"/>
    <text x="356" y="498" fill="#374151">工人生活费指数</text>
    <line x1="518" y1="493" x2="550" y2="493" stroke="#1d4ed8" stroke-width="3"/><circle cx="534" cy="493" r="4" fill="#1d4ed8"/>
    <text x="560" y="498" fill="#374151">货币购买力指数</text>
  </g>
  <text x="480" y="526" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="11" fill="#6b7280">资料：上海市政府社会局、国际劳工局中国分局；购买力指数为本文换算。</text>
</svg>
