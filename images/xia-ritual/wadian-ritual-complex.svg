<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">瓦店大型祭祀遗迹的考古要素复原图</title>
  <desc id="desc">依据瓦店遗址公开发掘资料，将围沟、夯土祭祀面、烧土、黄土墩、五谷坑、人骨坑、动物坑、螺蚌堆积、遗物坑和柱洞画在同一平面上。位置为概念性组合，不是精确测绘图。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbf7ef"/><stop offset="1" stop-color="#efe2c9"/></linearGradient>
    <pattern id="earth" width="18" height="18" patternUnits="userSpaceOnUse"><rect width="18" height="18" fill="#d6b786"/><circle cx="4" cy="6" r="1.2" fill="#b88f5e" opacity=".45"/><circle cx="14" cy="13" r="1" fill="#9c754b" opacity=".35"/></pattern>
    <pattern id="burnt" width="15" height="15" patternUnits="userSpaceOnUse"><rect width="15" height="15" fill="#a7462e"/><path d="M0 12 L12 0 M4 15 L15 4" stroke="#d06a44" stroke-width="2" opacity=".55"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#563b22" flood-opacity=".18"/></filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:40px;font-weight:760;fill:#342a20}.sub{font-size:19px;fill:#715c48}.label{font-size:18px;font-weight:720;fill:#342a20}.small{font-size:15px;fill:#6f5946}.num{font-size:17px;font-weight:800;fill:#fff}.legend{font-size:17px;fill:#4f4033}.note{font-size:15px;fill:#765f4b}.call{stroke:#6a513b;stroke-width:2.5;fill:none}.dash{stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1600" height="960" fill="url(#paper)"/>
  <g class="sans">
    <text x="72" y="67" class="title">瓦店：一处祭祀如何在地层中留下“行为链”</text>
    <text x="74" y="104" class="sub">约公元前 2000 年，约 800 平方米夯土祭祀建筑；下图为依据公开遗迹类型绘制的概念性平面，不是发掘测绘图。</text>
  </g>

  <g transform="translate(72 154)" filter="url(#shadow)">
    <rect width="1040" height="702" rx="28" fill="#c9a470"/>
    <path d="M54 68 H986 V634 H54 Z" fill="none" stroke="#795537" stroke-width="26" stroke-linecap="round" stroke-dasharray="54 18"/>
    <path d="M112 116 H928 V586 H112 Z" fill="url(#earth)" stroke="#a37a4f" stroke-width="5"/>
    <text x="520" y="145" text-anchor="middle" class="sans label">平整、夯筑的祭祀活动面</text>

    <g transform="translate(166 202)">
      <path d="M0 0 H270 V142 H0 Z" fill="url(#burnt)" stroke="#753321" stroke-width="4"/>
      <g stroke="#f0aa70" stroke-width="5" opacity=".7"><path d="M40 106 C70 75 76 42 60 15"/><path d="M120 114 C142 80 145 48 128 12"/><path d="M202 108 C228 70 230 40 215 9"/></g>
      <text x="135" y="174" text-anchor="middle" class="sans label">红烧土面／燔燎区</text>
    </g>

    <g transform="translate(551 198)">
      <ellipse cx="70" cy="76" rx="64" ry="35" fill="#dfc78e" stroke="#9b7849" stroke-width="4"/>
      <ellipse cx="230" cy="76" rx="64" ry="35" fill="#dfc78e" stroke="#9b7849" stroke-width="4"/>
      <text x="150" y="141" text-anchor="middle" class="sans label">黄土墩台：陈设祭品</text>
    </g>

    <g transform="translate(152 445)">
      <ellipse cx="72" cy="42" rx="66" ry="36" fill="#6f5138" stroke="#412d20" stroke-width="4"/>
      <g fill="#dec76d"><circle cx="48" cy="33" r="5"/><circle cx="66" cy="47" r="5"/><circle cx="82" cy="29" r="5"/><circle cx="99" cy="48" r="5"/></g>
      <text x="72" y="103" text-anchor="middle" class="sans label">五谷坑</text>
    </g>

    <g transform="translate(337 435)">
      <ellipse cx="86" cy="52" rx="80" ry="44" fill="#76594a" stroke="#49342a" stroke-width="4"/>
      <g stroke="#e9dcc7" stroke-width="8" stroke-linecap="round"><path d="M45 39 L77 63 M73 30 L106 69 M106 34 L131 57"/></g>
      <circle cx="44" cy="63" r="18" fill="none" stroke="#e9dcc7" stroke-width="7"/>
      <text x="86" y="119" text-anchor="middle" class="sans label">人骨坑／人骨层</text>
    </g>

    <g transform="translate(545 435)">
      <ellipse cx="86" cy="52" rx="80" ry="44" fill="#6e5944" stroke="#463528" stroke-width="4"/>
      <g stroke="#e5d2ae" stroke-width="8" stroke-linecap="round"><path d="M39 32 L79 67 M64 29 L112 69 M101 28 L139 60"/></g>
      <text x="86" y="119" text-anchor="middle" class="sans label">动物坑／动物沟</text>
    </g>

    <g transform="translate(752 435)">
      <ellipse cx="88" cy="52" rx="82" ry="44" fill="#846f55" stroke="#514431" stroke-width="4"/>
      <g fill="#e5d5b2" stroke="#8d7959" stroke-width="2"><ellipse cx="43" cy="41" rx="13" ry="8"/><ellipse cx="69" cy="61" rx="14" ry="8"/><ellipse cx="91" cy="36" rx="14" ry="8"/><ellipse cx="118" cy="58" rx="14" ry="8"/><ellipse cx="137" cy="34" rx="13" ry="8"/></g>
      <text x="88" y="119" text-anchor="middle" class="sans label">螺蚌堆积／宴飨残留</text>
    </g>

    <g fill="#62442e" stroke="#f3ddad" stroke-width="3">
      <circle cx="168" cy="171" r="12"/><circle cx="258" cy="171" r="12"/><circle cx="348" cy="171" r="12"/><circle cx="698" cy="171" r="12"/><circle cx="788" cy="171" r="12"/><circle cx="878" cy="171" r="12"/>
    </g>
    <text x="856" y="135" class="sans label">柱洞：可能支撑祭亭</text>
    <path d="M830 142 L793 167" class="call"/>

    <g transform="translate(825 270)">
      <ellipse cx="60" cy="60" rx="56" ry="48" fill="#775538" stroke="#472f20" stroke-width="4"/>
      <path d="M36 72 Q60 28 85 72" fill="none" stroke="#9fc1b5" stroke-width="10"/>
      <circle cx="60" cy="48" r="9" fill="#5d8a7a"/>
      <text x="60" y="132" text-anchor="middle" class="sans label">重要遗物坑</text>
    </g>
  </g>

  <g class="sans" transform="translate(1160 166)">
    <text x="0" y="0" class="title" style="font-size:29px">遗迹 → 行为解释</text>
    <g transform="translate(0 38)">
      <circle cx="21" cy="18" r="18" fill="#a7462e"/><text x="21" y="24" text-anchor="middle" class="num">1</text><text x="52" y="24" class="legend">红烧土与灰烬</text><text x="52" y="50" class="small">燃柴、燎烟、炙烧</text>
    </g>
    <g transform="translate(0 112)">
      <circle cx="21" cy="18" r="18" fill="#7b5943"/><text x="21" y="24" text-anchor="middle" class="num">2</text><text x="52" y="24" class="legend">人骨、动物骨坑</text><text x="52" y="50" class="small">杀生献祭或奠基</text>
    </g>
    <g transform="translate(0 186)">
      <circle cx="21" cy="18" r="18" fill="#c7a34f"/><text x="21" y="24" text-anchor="middle" class="num">3</text><text x="52" y="24" class="legend">五谷与遗物坑</text><text x="52" y="50" class="small">馈食、陈献、瘗埋</text>
    </g>
    <g transform="translate(0 260)">
      <circle cx="21" cy="18" r="18" fill="#8b7658"/><text x="21" y="24" text-anchor="middle" class="num">4</text><text x="52" y="24" class="legend">螺蚌密集堆积</text><text x="52" y="50" class="small">集体宴飨与季节线索</text>
    </g>
    <g transform="translate(0 334)">
      <circle cx="21" cy="18" r="18" fill="#594331"/><text x="21" y="24" text-anchor="middle" class="num">5</text><text x="52" y="24" class="legend">柱洞、黄土墩</text><text x="52" y="50" class="small">祭亭与陈设空间</text>
    </g>
    <rect x="0" y="430" width="360" height="210" rx="18" fill="#fffaf0" stroke="#ccb995" stroke-width="2"/>
    <text x="22" y="466" class="label">证据边界</text>
    <text x="22" y="501" class="note">• 遗迹组合支持祭祀解释</text>
    <text x="22" y="532" class="note">• 具体位置为示意，非测绘</text>
    <text x="22" y="563" class="note">• 神名、祝词、主持者不详</text>
    <text x="22" y="594" class="note">• “社”“墠”等是学术解释</text>
    <text x="22" y="625" class="note">  不是遗址自带的文字标签</text>
  </g>
  <text x="74" y="922" class="sans note">资料依据：方燕明等关于禹州瓦店遗址的公开发掘综述与 2022 夏文化论坛发布信息。图形为本文重绘。</text>
</svg>
