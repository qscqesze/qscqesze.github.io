<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">夏纪年范围祭祀行为链的证据化复原</title>
  <desc id="desc">从择时占问、整备祭场、征集祭品、杀牲与陈献、燔燎瘗埋、宴飨分食到封闭遗迹，区分直接考古证据、强推论和比较性推测。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8f4eb"/><stop offset="1" stop-color="#e7ddca"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#40362d" flood-opacity=".17"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#876b4b"/></marker>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:40px;font-weight:760;fill:#322a23}.sub{font-size:19px;fill:#6d5d4d}.step{font-size:22px;font-weight:760;fill:#362d25}.body{font-size:16px;fill:#5e4e40}.tag{font-size:14px;font-weight:760;fill:#fff}.legend{font-size:16px;fill:#554739}.num{font-size:22px;font-weight:820;fill:#fff}.note{font-size:15px;fill:#746454}.line{stroke:#876b4b;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g class="sans"><text x="72" y="66" class="title">一次祭祀可能怎样展开：从准备到封埋</text><text x="74" y="104" class="sub">这是“行为链”复原，不是夏代礼仪手册；实线为遗迹直接支持，虚线为结构性推论。</text></g>

  <g transform="translate(72 156)" class="sans">
    <g transform="translate(0 0)" filter="url(#shadow)"><rect width="330" height="246" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">1</text><text x="76" y="46" class="step">择时、占问与集合</text><path d="M45 102 L80 82 L115 102 L80 122 Z" fill="#d6c8a4" stroke="#6c5a44" stroke-width="3"/><path d="M80 82 L78 120 M62 94 L101 110" stroke="#9a3f2b" stroke-width="3"/><circle cx="160" cy="101" r="28" fill="#d8b85f"/><path d="M160 73 A28 28 0 0 0 160 129" fill="#fffaf0" opacity=".8"/><text x="24" y="164" class="body">卜骨可证占问传统；螺蚌季节</text><text x="24" y="190" class="body">分析提示秋祭为主，也有春祀。</text><rect x="24" y="208" width="106" height="25" rx="12" fill="#657b62"/><text x="77" y="226" text-anchor="middle" class="tag">考古证据较强</text></g>
    <g transform="translate(390 0)" filter="url(#shadow)"><rect width="330" height="246" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">2</text><text x="76" y="46" class="step">整地、设位与陈器</text><path d="M45 118 H268 L240 78 H78 Z" fill="#caa36e" stroke="#815f3e" stroke-width="3"/><g fill="#604a37"><circle cx="95" cy="78" r="7"/><circle cx="160" cy="78" r="7"/><circle cx="225" cy="78" r="7"/></g><path d="M97 78 V112 M160 78 V112 M225 78 V112" stroke="#604a37" stroke-width="6"/><text x="24" y="164" class="body">平整祭面，设置墩台、柱洞；</text><text x="24" y="190" class="body">陶器、玉器和食物进入祭场。</text><rect x="24" y="208" width="106" height="25" rx="12" fill="#657b62"/><text x="77" y="226" text-anchor="middle" class="tag">考古证据较强</text></g>
    <g transform="translate(780 0)" filter="url(#shadow)"><rect width="330" height="246" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">3</text><text x="76" y="46" class="step">征集、检查祭品</text><g transform="translate(36 72)"><ellipse cx="58" cy="49" rx="45" ry="27" fill="#8d6545"/><circle cx="97" cy="39" r="17" fill="#8d6545"/><path d="M30 70 V105 M58 71 V105 M88 65 V105" stroke="#6f4f38" stroke-width="7"/><ellipse cx="176" cy="62" rx="36" ry="24" fill="#d7c6a5"/><circle cx="207" cy="52" r="14" fill="#d7c6a5"/><path d="M157 80 V106 M184 80 V106" stroke="#99876b" stroke-width="6"/><path d="M236 28 h43 v79 h-43 Z" fill="#d4ad5d" opacity=".85"/></g><text x="24" y="164" class="body">猪、牛、羊、狗与鹿；谷物、</text><text x="24" y="190" class="body">酒食及贵重器物按活动汇集。</text><rect x="24" y="208" width="106" height="25" rx="12" fill="#657b62"/><text x="77" y="226" text-anchor="middle" class="tag">考古证据较强</text></g>
    <g transform="translate(1170 0)" filter="url(#shadow)"><rect width="330" height="246" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#9b6948"/><text x="38" y="46" text-anchor="middle" class="num">4</text><text x="76" y="46" class="step">杀生、分割与陈献</text><path d="M38 118 H292" stroke="#775842" stroke-width="8"/><path d="M91 115 V73 M166 115 V60 M241 115 V78" stroke="#775842" stroke-width="6"/><ellipse cx="91" cy="68" rx="24" ry="14" fill="#d3b26b"/><path d="M144 65 Q166 37 188 65" fill="none" stroke="#a7b78f" stroke-width="10"/><ellipse cx="241" cy="70" rx="27" ry="17" fill="#c9a06d"/><text x="24" y="164" class="body">骨骼埋藏支持杀生献祭；是否</text><text x="24" y="190" class="body">先告祝、灌酒及次序仍不确定。</text><rect x="24" y="208" width="122" height="25" rx="12" fill="#9b6948"/><text x="85" y="226" text-anchor="middle" class="tag">行为存在／礼次不详</text></g>

    <path d="M330 123 H380" class="line"/><path d="M720 123 H770" class="line"/><path d="M1110 123 H1160" class="line"/>

    <g transform="translate(0 326)" filter="url(#shadow)"><rect width="450" height="250" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">5</text><text x="76" y="46" class="step">燔燎、瘗埋、馈食与血祭</text><g transform="translate(38 72)"><path d="M23 95 C-2 59 40 49 22 13 C66 42 64 67 48 95 Z" fill="#b94d30"/><path d="M77 97 Q122 45 169 97" fill="#7c5a43"/><path d="M96 86 Q122 62 151 86" fill="none" stroke="#d6c67d" stroke-width="8"/><path d="M222 94 H350 L325 56 H246 Z" fill="#d2b37d" stroke="#846244" stroke-width="3"/><circle cx="286" cy="76" r="18" fill="#8b3b2e" opacity=".75"/></g><text x="24" y="185" class="body">瓦店的烧土、五谷坑、人骨与动物坑、重要遗物坑共同支持多种处理方式并存。</text><rect x="24" y="212" width="106" height="25" rx="12" fill="#657b62"/><text x="77" y="230" text-anchor="middle" class="tag">考古证据较强</text></g>
    <g transform="translate(525 326)" filter="url(#shadow)"><rect width="450" height="250" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">6</text><text x="76" y="46" class="step">宴飨、分食与展示等级</text><g transform="translate(48 78)"><path d="M0 78 Q68 20 136 78 Q202 22 270 78 Q319 40 355 77" fill="none" stroke="#7e624d" stroke-width="8"/><g fill="#e3d2ad" stroke="#9f8c69" stroke-width="2"><ellipse cx="54" cy="96" rx="15" ry="9"/><ellipse cx="121" cy="95" rx="15" ry="9"/><ellipse cx="196" cy="95" rx="15" ry="9"/><ellipse cx="284" cy="95" rx="15" ry="9"/></g></g><text x="24" y="185" class="body">螺蚌堆积支持集体进食；参加者范围、席次与分配比例不可复原。</text><rect x="24" y="212" width="122" height="25" rx="12" fill="#9b6948"/><text x="85" y="230" text-anchor="middle" class="tag">结构可推／礼数不详</text></g>
    <g transform="translate(1050 326)" filter="url(#shadow)"><rect width="450" height="250" rx="24" fill="#fffaf0"/><circle cx="38" cy="38" r="24" fill="#657b62"/><text x="38" y="46" text-anchor="middle" class="num">7</text><text x="76" y="46" class="step">封坑、清场与长期重复</text><g transform="translate(56 72)"><path d="M20 85 Q130 10 240 85" fill="#b89565" stroke="#745338" stroke-width="4"/><path d="M20 85 H240" stroke="#4f3827" stroke-width="5"/><path d="M286 101 V17 M318 101 V36 M350 101 V5" stroke="#8c6c4d" stroke-width="10"/><path d="M274 100 H364" stroke="#62472f" stroke-width="7"/></g><text x="24" y="185" class="body">层层堆积显示祭场反复使用；瓦店该建筑延续约百年，而非一次盛典。</text><rect x="24" y="212" width="106" height="25" rx="12" fill="#657b62"/><text x="77" y="230" text-anchor="middle" class="tag">考古证据较强</text></g>
    <path d="M450 451 H515" class="line"/><path d="M975 451 H1040" class="line"/>
  </g>

  <g transform="translate(78 784)" class="sans"><circle cx="14" cy="0" r="12" fill="#657b62"/><text x="36" y="6" class="legend">遗迹或检测直接支持</text><circle cx="279" cy="0" r="12" fill="#9b6948"/><text x="301" y="6" class="legend">行为存在，但名称、顺序或礼数不详</text><path d="M737 0 H817" stroke="#876b4b" stroke-width="4" stroke-dasharray="8 8"/><text x="835" y="6" class="legend">比较性推论，不应写成夏礼定制</text></g>
  <text x="78" y="848" class="sans note">“燔燎、瘗埋、馈食、磔辜、血祭”等称谓来自研究者对遗迹功能的解释；夏代主持者当时使用何种术语，尚无同时代文字可证。</text>
</svg>
