<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Prefill、Decode 与 KV Cache</title>
  <desc id="desc">左侧展示 Prefill 阶段并行读取整段问题，右侧展示 Decode 阶段逐 token 生成，并持续读写 KV Cache。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d1727"/><stop offset="1" stop-color="#182842"/></linearGradient>
    <linearGradient id="pref" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#59d9c6"/><stop offset="1" stop-color="#55aadd"/></linearGradient>
    <linearGradient id="dec" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7c76ef"/><stop offset="1" stop-color="#b06de1"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#8aa8c9"/></marker>
    <style>
      .cn{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
      .title{font-size:50px;font-weight:750;fill:#f5f8ff}
      .sub{font-size:22px;fill:#b9c7df}
      .head{font-size:30px;font-weight:700;fill:#f7f9ff}
      .body{font-size:19px;fill:#b7c5dd}
      .small{font-size:16px;fill:#aab9d2}
      .dark{font-size:22px;font-weight:700;fill:#17243a}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1550" cy="0" r="300" fill="#8069df" opacity="0.08"/>
  <g class="cn">
    <text x="76" y="86" class="title">为什么“读题”和“写答案”的速度不一样？</text>
    <text x="78" y="128" class="sub">Prefill 可以并行读完整段输入；Decode 必须沿着自回归链条，一个 token 接一个 token</text>

    <g filter="url(#shadow)">
      <rect x="75" y="186" width="675" height="525" rx="34" fill="#14253c" stroke="#31506c" stroke-width="2"/>
      <rect x="790" y="186" width="735" height="525" rx="34" fill="#17223c" stroke="#413d70" stroke-width="2"/>
    </g>

    <g>
      <rect x="108" y="218" width="142" height="46" rx="15" fill="url(#pref)"/>
      <text x="179" y="249" class="dark" text-anchor="middle">PREFILL</text>
      <text x="276" y="250" class="head">一次读完题目</text>

      <g transform="translate(115,320)">
        <rect x="0" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="35" y="39" class="head" text-anchor="middle">请</text>
        <rect x="84" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="119" y="39" class="head" text-anchor="middle">解</text>
        <rect x="168" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="203" y="39" class="head" text-anchor="middle">释</text>
        <rect x="252" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="287" y="39" class="head" text-anchor="middle">一</text>
        <rect x="336" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="371" y="39" class="head" text-anchor="middle">下</text>
        <rect x="420" y="0" width="70" height="62" rx="15" fill="#23425e" stroke="#55bdae"/><text x="455" y="39" class="head" text-anchor="middle">…</text>
      </g>

      <g stroke="#5fcbbc" stroke-width="3" fill="none" marker-end="url(#arrow)">
        <path d="M150 394 L150 447"/><path d="M234 394 L234 447"/><path d="M318 394 L318 447"/>
        <path d="M402 394 L402 447"/><path d="M486 394 L486 447"/><path d="M570 394 L570 447"/>
      </g>
      <rect x="115" y="460" width="586" height="100" rx="22" fill="#0e1c2d" stroke="#44748b" stroke-width="2"/>
      <text x="408" y="501" class="head" text-anchor="middle">整段并行通过 Transformer</text>
      <text x="408" y="533" class="body" text-anchor="middle">同时算出各层的 Key 和 Value</text>

      <rect x="115" y="595" width="586" height="72" rx="20" fill="#193a49" stroke="#4da998"/>
      <text x="408" y="625" class="head" text-anchor="middle">产出第一个 token ＋ KV Cache</text>
      <text x="408" y="652" class="small" text-anchor="middle">提示词越长，首 token 延迟通常越高</text>
    </g>

    <g>
      <rect x="823" y="218" width="142" height="46" rx="15" fill="url(#dec)"/>
      <text x="894" y="249" class="dark" text-anchor="middle">DECODE</text>
      <text x="990" y="250" class="head">一次写一个 token</text>

      <g transform="translate(835,317)">
        <rect x="0" y="0" width="78" height="62" rx="15" fill="#6e66d7"/><text x="39" y="40" class="head" text-anchor="middle">答</text>
        <line x1="84" y1="31" x2="123" y2="31" stroke="#9aa7c4" stroke-width="4" marker-end="url(#arrow)"/>
        <rect x="132" y="0" width="78" height="62" rx="15" fill="#7664d1"/><text x="171" y="40" class="head" text-anchor="middle">案</text>
        <line x1="216" y1="31" x2="255" y2="31" stroke="#9aa7c4" stroke-width="4" marker-end="url(#arrow)"/>
        <rect x="264" y="0" width="78" height="62" rx="15" fill="#8263ca"/><text x="303" y="40" class="head" text-anchor="middle">是</text>
        <line x1="348" y1="31" x2="387" y2="31" stroke="#9aa7c4" stroke-width="4" marker-end="url(#arrow)"/>
        <rect x="396" y="0" width="78" height="62" rx="15" fill="#9566cf"/><text x="435" y="40" class="head" text-anchor="middle">…</text>
      </g>

      <rect x="835" y="440" width="275" height="170" rx="24" fill="#111c30" stroke="#5f5a9c" stroke-width="2"/>
      <text x="972" y="482" class="head" text-anchor="middle">新 token</text>
      <text x="972" y="518" class="body" text-anchor="middle">只计算新位置的 Q / K / V</text>
      <text x="972" y="551" class="body" text-anchor="middle">再走过全部 Transformer 层</text>
      <text x="972" y="584" class="small" text-anchor="middle">每一轮必须等上一轮结束</text>

      <rect x="1160" y="418" width="310" height="212" rx="26" fill="#202f48" stroke="#6987aa" stroke-width="2"/>
      <text x="1315" y="463" class="head" text-anchor="middle">KV CACHE</text>
      <text x="1315" y="494" class="body" text-anchor="middle">保存所有旧 token 的 K、V</text>
      <g transform="translate(1200,526)">
        <rect x="0" y="0" width="230" height="18" rx="6" fill="#536d90"/>
        <rect x="0" y="30" width="230" height="18" rx="6" fill="#5b6b9b"/>
        <rect x="0" y="60" width="230" height="18" rx="6" fill="#655f9e"/>
      </g>
      <path d="M1110 500 C1132 500,1136 500,1150 500" stroke="#8aa8c9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
      <path d="M1160 570 C1130 648,1030 646,1000 620" stroke="#8aa8c9" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
      <text x="1138" y="670" class="small" text-anchor="middle">每轮读取旧记录，并写入新记录</text>
    </g>

    <g>
      <line x1="750" y1="450" x2="790" y2="450" stroke="#83a2c6" stroke-width="4" marker-end="url(#arrow)"/>
      <text x="770" y="428" class="small" text-anchor="middle">切换阶段</text>
    </g>

    <g transform="translate(75,755)">
      <rect x="0" y="0" width="450" height="92" rx="23" fill="#15283e" stroke="#31516c"/>
      <text x="28" y="38" class="head">TTFT · 首 token 延迟</text>
      <text x="28" y="68" class="body">点发送后，多久看到第一个字</text>
      <rect x="490" y="0" width="485" height="92" rx="23" fill="#19243d" stroke="#403d6a"/>
      <text x="518" y="38" class="head">生成速度 · tokens/s</text>
      <text x="518" y="68" class="body">第一个字之后，文字往外蹦多快</text>
      <rect x="1015" y="0" width="435" height="92" rx="23" fill="#1b2c42" stroke="#3d5d77"/>
      <text x="1043" y="38" class="head">显存占用</text>
      <text x="1043" y="68" class="body">长上下文与高并发会放大 KV Cache</text>
    </g>
  </g>
</svg>
