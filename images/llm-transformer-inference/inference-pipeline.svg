<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">大模型推理全流程</title>
  <desc id="desc">从用户问题、分词、向量化、Transformer、多层计算、概率采样到逐 token 输出的完整流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.55" stop-color="#102449"/>
      <stop offset="1" stop-color="#18295c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62e7d4"/>
      <stop offset="1" stop-color="#7aa7ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020712" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#79dbc9"/>
    </marker>
    <style>
      .cn{font-family:"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
      .title{font-size:54px;font-weight:700;fill:#f7fbff;letter-spacing:2px}
      .subtitle{font-size:24px;fill:#b9c8e9}
      .step{font-size:17px;font-weight:700;fill:#69e2cf;letter-spacing:1.5px}
      .label{font-size:28px;font-weight:700;fill:#f8fbff}
      .body{font-size:19px;fill:#bdc9e5}
      .tiny{font-size:16px;fill:#94a7cb}
      .card{fill:#132747;stroke:#35527f;stroke-width:2}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="80" r="280" fill="#3277d8" opacity="0.08"/>
  <circle cx="140" cy="850" r="310" fill="#36d7bc" opacity="0.06"/>

  <g class="cn">
    <text x="90" y="98" class="title">一句话，怎样穿过大模型？</text>
    <text x="92" y="143" class="subtitle">Transformer 推理不是一次“灵光乍现”，而是一条反复运行的 token 流水线</text>

    <g filter="url(#shadow)">
      <rect x="90" y="235" rx="26" ry="26" width="220" height="230" class="card"/>
      <rect x="350" y="235" rx="26" ry="26" width="220" height="230" class="card"/>
      <rect x="610" y="235" rx="26" ry="26" width="220" height="230" class="card"/>
      <rect x="870" y="235" rx="26" ry="26" width="220" height="230" fill="#19355a" stroke="#4c7ba4" stroke-width="2"/>
      <rect x="1130" y="235" rx="26" ry="26" width="220" height="230" class="card"/>
      <rect x="1390" y="235" rx="26" ry="26" width="120" height="230" fill="#15344a" stroke="#3c7d85" stroke-width="2"/>
    </g>

    <g>
      <text x="118" y="274" class="step">01 · 上下文</text>
      <rect x="125" y="302" width="150" height="90" rx="14" fill="#0d1a30" stroke="#4b6590"/>
      <circle cx="151" cy="329" r="10" fill="#62e7d4"/>
      <rect x="171" y="319" width="77" height="13" rx="6" fill="#647ca6"/>
      <rect x="143" y="351" width="105" height="12" rx="6" fill="#3f5a85"/>
      <rect x="143" y="373" width="78" height="12" rx="6" fill="#3f5a85"/>
      <text x="118" y="424" class="label">拼装请求</text>
      <text x="118" y="450" class="tiny">指令＋历史＋问题</text>
    </g>

    <g>
      <text x="378" y="274" class="step">02 · TOKENIZER</text>
      <g transform="translate(383,310)">
        <rect x="0" y="0" width="48" height="42" rx="9" fill="#28486d"/><text x="12" y="29" class="body" fill="#fff">大</text>
        <rect x="56" y="0" width="67" height="42" rx="9" fill="#285b72"/><text x="68" y="29" class="body" fill="#fff">模型</text>
        <rect x="131" y="0" width="48" height="42" rx="9" fill="#34617c"/><text x="143" y="29" class="body" fill="#fff">→</text>
        <rect x="15" y="60" width="58" height="42" rx="9" fill="#203858"/><text x="27" y="88" class="body">431</text>
        <rect x="92" y="60" width="72" height="42" rx="9" fill="#203858"/><text x="104" y="88" class="body">9827</text>
      </g>
      <text x="378" y="424" class="label">切成 token</text>
      <text x="378" y="450" class="tiny">文字变成整数 ID</text>
    </g>

    <g>
      <text x="638" y="274" class="step">03 · EMBEDDING</text>
      <g transform="translate(650,306)">
        <rect x="0" y="0" width="148" height="92" rx="15" fill="#0e1d34" stroke="#476994"/>
        <g fill="#69dfce">
          <circle cx="25" cy="24" r="5"/><circle cx="52" cy="24" r="5"/><circle cx="79" cy="24" r="5"/><circle cx="106" cy="24" r="5"/><circle cx="133" cy="24" r="5"/>
        </g>
        <g fill="#7aa7ff">
          <circle cx="25" cy="48" r="5"/><circle cx="52" cy="48" r="5"/><circle cx="79" cy="48" r="5"/><circle cx="106" cy="48" r="5"/><circle cx="133" cy="48" r="5"/>
        </g>
        <g fill="#b693ff">
          <circle cx="25" cy="72" r="5"/><circle cx="52" cy="72" r="5"/><circle cx="79" cy="72" r="5"/><circle cx="106" cy="72" r="5"/><circle cx="133" cy="72" r="5"/>
        </g>
      </g>
      <text x="638" y="424" class="label">变成向量</text>
      <text x="638" y="450" class="tiny">加入语义与位置信息</text>
    </g>

    <g>
      <text x="898" y="274" class="step">04 · TRANSFORMER × N</text>
      <g transform="translate(911,300)">
        <rect x="8" y="56" width="150" height="68" rx="15" fill="#204b75" stroke="#6ca5d2"/>
        <rect x="16" y="42" width="150" height="68" rx="15" fill="#1e4268" stroke="#5d8ab9"/>
        <rect x="24" y="28" width="150" height="68" rx="15" fill="#19395e" stroke="#517cad"/>
        <text x="45" y="70" class="body">注意力 + FFN</text>
      </g>
      <text x="898" y="424" class="label">逐层理解</text>
      <text x="898" y="450" class="tiny">聚合上下文、改写表示</text>
    </g>

    <g>
      <text x="1158" y="274" class="step">05 · LOGITS</text>
      <g transform="translate(1165,308)">
        <rect x="0" y="0" width="150" height="90" rx="14" fill="#0e1c33" stroke="#46688f"/>
        <rect x="22" y="56" width="18" height="19" rx="4" fill="#526f9b"/>
        <rect x="51" y="40" width="18" height="35" rx="4" fill="#6586b8"/>
        <rect x="80" y="13" width="18" height="62" rx="4" fill="#61dfce"/>
        <rect x="109" y="48" width="18" height="27" rx="4" fill="#745fa5"/>
      </g>
      <text x="1158" y="424" class="label">得到概率</text>
      <text x="1158" y="450" class="tiny">为词表中的候选打分</text>
    </g>

    <g>
      <text x="1409" y="274" class="step">06</text>
      <circle cx="1450" cy="348" r="42" fill="url(#accent)"/>
      <text x="1436" y="359" style="font-size:32px;font-weight:800;fill:#092033">答</text>
      <text x="1409" y="424" class="label">输出</text>
      <text x="1409" y="450" class="tiny">1 token</text>
    </g>

    <g fill="none" stroke="#79dbc9" stroke-width="5" marker-end="url(#arrow)">
      <path d="M 310 350 L 340 350"/>
      <path d="M 570 350 L 600 350"/>
      <path d="M 830 350 L 860 350"/>
      <path d="M 1090 350 L 1120 350"/>
      <path d="M 1350 350 L 1380 350"/>
    </g>

    <g>
      <path d="M 1450 490 C 1450 690, 1170 718, 950 718 C 650 718, 360 688, 360 515" fill="none" stroke="#79dbc9" stroke-width="5" stroke-dasharray="10 12" marker-end="url(#arrow)"/>
      <rect x="594" y="645" width="625" height="106" rx="24" fill="#0d1d35" stroke="#3f6e87" stroke-width="2"/>
      <text x="647" y="689" class="label">把新 token 接回上下文，再跑一轮</text>
      <text x="647" y="723" class="body">直到生成结束标记、达到长度限制或被外部系统中止</text>
    </g>

    <text x="90" y="841" class="subtitle">底层主任务：根据已经看见的 token，预测下一个 token</text>
    <rect x="90" y="861" width="810" height="5" rx="2.5" fill="url(#accent)"/>
  </g>
</svg>
