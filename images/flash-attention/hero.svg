<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention v1 到 v4 的演进</title>
  <desc id="desc">从减少显存读写，到改进并行，再到 Hopper 异步流水线和 Blackwell 非对称硬件优化。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a2f"/>
      <stop offset="1" stop-color="#24152f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <g opacity=".12" stroke="#c4b5fd">
    <path d="M0 90h1200M0 180h1200M0 270h1200M0 360h1200M0 450h1200M0 540h1200"/>
    <path d="M100 0v630M250 0v630M400 0v630M550 0v630M700 0v630M850 0v630M1000 0v630M1150 0v630"/>
  </g>
  <text x="72" y="92" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="750">FlashAttention v1 → v4</text>
  <text x="74" y="132" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="22">同一个精确注意力公式，四代越来越懂 GPU 的实现</text>
  <path d="M125 350H1075" stroke="url(#line)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(165 350)">
      <circle r="42" fill="#0f172a" stroke="#67e8f9" stroke-width="5"/>
      <text y="10" fill="#e0f2fe" font-size="28" font-weight="700">v1</text>
      <text y="86" fill="#f8fafc" font-size="22" font-weight="700">少搬数据</text>
      <text y="116" fill="#94a3b8" font-size="17">Tiling · Online Softmax</text>
      <text y="142" fill="#94a3b8" font-size="17">A100 / IO-aware</text>
    </g>
    <g transform="translate(455 350)">
      <circle r="42" fill="#0f172a" stroke="#34d399" stroke-width="5"/>
      <text y="10" fill="#d1fae5" font-size="28" font-weight="700">v2</text>
      <text y="86" fill="#f8fafc" font-size="22" font-weight="700">多干并行活</text>
      <text y="116" fill="#94a3b8" font-size="17">Occupancy · Warp 分工</text>
      <text y="142" fill="#94a3b8" font-size="17">A100 / Better scheduling</text>
    </g>
    <g transform="translate(745 350)">
      <circle r="42" fill="#0f172a" stroke="#c084fc" stroke-width="5"/>
      <text y="10" fill="#f3e8ff" font-size="28" font-weight="700">v3</text>
      <text y="86" fill="#f8fafc" font-size="22" font-weight="700">让工序重叠</text>
      <text y="116" fill="#94a3b8" font-size="17">TMA · WGMMA · FP8</text>
      <text y="142" fill="#94a3b8" font-size="17">H100 / Asynchrony</text>
    </g>
    <g transform="translate(1035 350)">
      <circle r="42" fill="#0f172a" stroke="#f59e0b" stroke-width="5"/>
      <text y="10" fill="#fef3c7" font-size="28" font-weight="700">v4</text>
      <text y="86" fill="#f8fafc" font-size="22" font-weight="700">追新瓶颈</text>
      <text y="116" fill="#94a3b8" font-size="17">TMEM · 2-CTA · Exp</text>
      <text y="142" fill="#94a3b8" font-size="17">B200 / Co-design</text>
    </g>
  </g>
  <text x="74" y="582" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="18">核心不变：不近似、不稀疏化，仍然计算 softmax(QKᵀ / √d)V</text>
</svg>
