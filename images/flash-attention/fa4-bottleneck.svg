<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">FlashAttention-4 应对 Blackwell 的非对称扩展</title>
  <desc id="desc">Tensor Core 吞吐翻倍而指数单元与共享内存没有同步增长，v4 使用 TMEM、指数函数仿真、条件重缩放和 2-CTA。</desc>
  <rect width="1200" height="600" rx="24" fill="#f8fafc"/>
  <style>.h{font:700 28px system-ui,sans-serif;fill:#172033}.t{font:700 20px system-ui,sans-serif;fill:#172033}.s{font:16px system-ui,sans-serif;fill:#526071}.w{font:700 16px system-ui,sans-serif;fill:#fff}</style>
  <text x="56" y="60" class="h">v4：发动机翻倍了，堵车却发生在收费站和匝道</text>
  <g transform="translate(58 92)">
    <text x="0" y="24" class="t">Hopper → Blackwell 的不对称增长</text>
    <text x="0" y="72" class="s">Tensor Core（BF16）</text><rect x="190" y="48" width="540" height="34" rx="8" fill="#7c3aed"/><text x="744" y="71" class="s">约 2×</text>
    <text x="0" y="120" class="s">指数单元 MUFU</text><rect x="190" y="96" width="270" height="34" rx="8" fill="#f59e0b"/><text x="474" y="119" class="s">基本不变</text>
    <text x="0" y="168" class="s">Shared Memory</text><rect x="190" y="144" width="270" height="34" rx="8" fill="#0ea5e9"/><text x="474" y="167" class="s">读带宽不变</text>
    <rect x="810" y="24" width="316" height="164" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="968" y="60" text-anchor="middle" class="t">瓶颈转移</text>
    <text x="968" y="96" text-anchor="middle" class="s">矩阵乘更早做完</text>
    <text x="968" y="126" text-anchor="middle" class="s">开始等 exp、片上搬运</text>
    <text x="968" y="156" text-anchor="middle" class="s">以及反向传播归约</text>
  </g>
  <g transform="translate(58 314)">
    <rect width="1084" height="220" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="42" class="t">FlashAttention-4 的四个回答</text>
    <g transform="translate(28 66)">
      <rect width="238" height="118" rx="14" fill="#ede9fe" stroke="#a78bfa"/><text x="119" y="36" text-anchor="middle" class="t">TMEM + 新流水线</text><text x="119" y="70" text-anchor="middle" class="s">更大 tile，MMA 结果</text><text x="119" y="94" text-anchor="middle" class="s">直接进 Tensor Memory</text>
      <rect x="260" width="238" height="118" rx="14" fill="#fff7ed" stroke="#fb923c"/><text x="379" y="36" text-anchor="middle" class="t">软件算一部分 exp</text><text x="379" y="70" text-anchor="middle" class="s">用 FMA 多项式分担</text><text x="379" y="94" text-anchor="middle" class="s">MUFU 的压力</text>
      <rect x="520" width="238" height="118" rx="14" fill="#ecfdf5" stroke="#34d399"/><text x="639" y="36" text-anchor="middle" class="t">条件重缩放</text><text x="639" y="70" text-anchor="middle" class="s">最大值变化不够大时</text><text x="639" y="94" text-anchor="middle" class="s">暂时不重算旧输出</text>
      <rect x="780" width="238" height="118" rx="14" fill="#eff6ff" stroke="#60a5fa"/><text x="899" y="36" text-anchor="middle" class="t">2-CTA 反向传播</text><text x="899" y="70" text-anchor="middle" class="s">两组协作，减少 SMEM</text><text x="899" y="94" text-anchor="middle" class="s">流量与原子加</text>
    </g>
  </g>
</svg>
