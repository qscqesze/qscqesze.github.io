<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">分块与在线 Softmax</title>
  <desc id="desc">注意力矩阵按块扫描，每一行只维护最大值、指数和与加权输出三个状态。</desc>
  <rect width="1200" height="620" rx="24" fill="#f8fafc"/>
  <style>.h{font:700 29px system-ui,sans-serif;fill:#172033}.t{font:700 20px system-ui,sans-serif;fill:#172033}.s{font:16px system-ui,sans-serif;fill:#526071}.num{font:700 22px ui-monospace,monospace;fill:#fff}.cell{stroke:#fff;stroke-width:4}</style>
  <text x="56" y="62" class="h">不用看完整行，也能算出完全相同的 Softmax</text>
  <g transform="translate(66 110)">
    <text x="0" y="-14" class="t">一行分数被切成 4 块</text>
    <g transform="translate(0 12)">
      <rect width="150" height="84" rx="12" fill="#38bdf8" class="cell"/><text x="75" y="50" text-anchor="middle" class="num">[ 1, 2 ]</text>
      <rect x="150" width="150" height="84" rx="12" fill="#34d399" class="cell"/><text x="225" y="50" text-anchor="middle" class="num">[ 0, 3 ]</text>
      <rect x="300" width="150" height="84" rx="12" fill="#a78bfa" class="cell"/><text x="375" y="50" text-anchor="middle" class="num">[ 5, 1 ]</text>
      <rect x="450" width="150" height="84" rx="12" fill="#fb923c" class="cell"/><text x="525" y="50" text-anchor="middle" class="num">[ 2, 4 ]</text>
    </g>
    <text x="300" y="130" text-anchor="middle" class="s">从左向右逐块扫描，不保存整行概率</text>
  </g>
  <g transform="translate(730 92)">
    <rect width="400" height="170" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="28" y="42" class="t">每一行只带着 3 件行李</text>
    <circle cx="48" cy="82" r="18" fill="#0ea5e9"/><text x="48" y="89" text-anchor="middle" class="num" font-size="16">m</text><text x="80" y="88" class="s">目前见过的最大分数</text>
    <circle cx="48" cy="122" r="18" fill="#10b981"/><text x="48" y="129" text-anchor="middle" class="num" font-size="16">ℓ</text><text x="80" y="128" class="s">以 m 为基准的指数和</text>
    <circle cx="48" cy="158" r="18" fill="#8b5cf6"/><text x="48" y="165" text-anchor="middle" class="num" font-size="16">O</text><text x="80" y="164" class="s">尚未最终归一化的加权输出</text>
  </g>
  <path d="M366 280v55" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#64748b"/></marker></defs>
  <g transform="translate(68 348)">
    <rect width="1064" height="194" rx="20" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
    <text x="28" y="40" class="t">新块到来时，先把旧账换到同一个“计价单位”</text>
    <text x="35" y="88" class="s">① 新最大值：mₙₑw = max(mₒₗd, max(Sⱼ))</text>
    <text x="35" y="124" class="s">② 旧指数和要乘 e^(mₒₗd − mₙₑw)，新块也以 mₙₑw 为基准</text>
    <text x="35" y="160" class="s">③ 旧输出和新输出按同样比例合并；扫完所有块后再除以最终 ℓ</text>
    <rect x="694" y="50" width="334" height="106" rx="14" fill="#fff" stroke="#818cf8" stroke-width="2"/>
    <text x="861" y="84" text-anchor="middle" class="t" fill="#4338ca">为什么不会近似？</text>
    <text x="861" y="116" text-anchor="middle" class="s">只是改变求和顺序，并持续校正尺度</text>
    <text x="861" y="142" text-anchor="middle" class="s">数学上仍是同一个 softmax</text>
  </g>
</svg>
