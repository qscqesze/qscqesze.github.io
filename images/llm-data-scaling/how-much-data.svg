<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">不同参数规模对应的数据量与前沿模型 token 参数比</title>
  <desc id="desc">左侧给出约二十 token 每参数的 Chinchilla 参照量，右侧比较 GPT-3、Chinchilla、Llama 3、DeepSeek V3 与 Qwen3。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf3"/><stop offset="1" stop-color="#eef6f4"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173f39" flood-opacity=".12"/></filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:42px;font-weight:760;fill:#203633}.subtitle{font-size:20px;fill:#5c6d69}.section{font-size:25px;font-weight:750;fill:#27413c}.head{font-size:17px;font-weight:730;fill:#fff}.cell{font-size:17px;fill:#334b46}.cellStrong{font-size:18px;font-weight:730;fill:#263f3a}.cardTitle{font-size:21px;font-weight:740;fill:#283f3a}.metric{font-size:27px;font-weight:800;fill:#9c4e3f}.cardText{font-size:15px;fill:#596b67}.small{font-size:15px;fill:#63746f}.band{font-size:18px;font-weight:720;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="940" rx="30" fill="url(#bg)"/>
  <text x="78" y="72" class="sans title">数据量多大才算大？先问模型多大、目标是什么、token 是否有效</text>
  <text x="80" y="110" class="sans subtitle">20N 是训练 FLOPs 最优的历史参照，不是上线标准；现代部署型模型经常在同一参数规模上消费更多 token。</text>

  <text x="80" y="172" class="sans section">Chinchilla 邻域的数量级尺：D ≈ 20N</text>
  <g class="sans" filter="url(#shadow)">
    <rect x="70" y="205" width="690" height="498" rx="22" fill="#fff" stroke="#d7dfdc" stroke-width="2"/>
    <path d="M70 257 H760" stroke="#315e58" stroke-width="52"/>
    <text x="150" y="264" class="head">模型参数 N</text><text x="380" y="264" class="head">参照训练量 20N</text><text x="610" y="264" class="head">近似训练 FLOPs</text>
    <g class="cell">
      <text x="150" y="318" class="cellStrong">0.5B</text><text x="380" y="318">10B tokens</text><text x="610" y="318">3×10¹⁹</text>
      <text x="150" y="376" class="cellStrong">1B</text><text x="380" y="376">20B tokens</text><text x="610" y="376">1.2×10²⁰</text>
      <text x="150" y="434" class="cellStrong">3B</text><text x="380" y="434">60B tokens</text><text x="610" y="434">1.08×10²¹</text>
      <text x="150" y="492" class="cellStrong">7B</text><text x="380" y="492">140B tokens</text><text x="610" y="492">5.88×10²¹</text>
      <text x="150" y="550" class="cellStrong">13B</text><text x="380" y="550">260B tokens</text><text x="610" y="550">2.03×10²²</text>
      <text x="150" y="608" class="cellStrong">70B</text><text x="380" y="608">1.4T tokens</text><text x="610" y="608">5.88×10²³</text>
      <text x="150" y="666" class="cellStrong">400B</text><text x="380" y="666">8T tokens</text><text x="610" y="666">1.92×10²⁵</text>
    </g>
    <g stroke="#e4ebe9"><path d="M95 337 H735"/><path d="M95 395 H735"/><path d="M95 453 H735"/><path d="M95 511 H735"/><path d="M95 569 H735"/><path d="M95 627 H735"/></g>
  </g>

  <text x="820" y="172" class="sans section">公开前沿模型显示：最优比率随经济目标移动</text>
  <g class="sans" filter="url(#shadow)">
    <g transform="translate(810 205)"><rect width="340" height="146" rx="21" fill="#fff" stroke="#d6dfdc" stroke-width="2"/><text x="22" y="38" class="cardTitle">GPT-3（dense）</text><text x="22" y="78" class="metric">≈ 1.7 tokens/参数</text><text x="22" y="108" class="cardText">175B 参数，约 300B 训练 tokens</text><text x="22" y="132" class="cardText">典型“参数过大、数据不足”时期</text></g>
    <g transform="translate(1185 205)"><rect width="340" height="146" rx="21" fill="#fff8e8" stroke="#e1ca8d" stroke-width="2"/><text x="22" y="38" class="cardTitle">Chinchilla（dense）</text><text x="22" y="78" class="metric">20 tokens/参数</text><text x="22" y="108" class="cardText">70B 参数，1.4T tokens</text><text x="22" y="132" class="cardText">固定训练算力下的著名参照点</text></g>
    <g transform="translate(810 382)"><rect width="340" height="146" rx="21" fill="#eef7f3" stroke="#abd0c2" stroke-width="2"/><text x="22" y="38" class="cardTitle">Llama 3 405B（dense）</text><text x="22" y="78" class="metric">≈ 38.5 tokens/参数</text><text x="22" y="108" class="cardText">405B 参数，15.6T tokens</text><text x="22" y="132" class="cardText">小版本同数据训练时比率会更高</text></g>
    <g transform="translate(1185 382)"><rect width="340" height="146" rx="21" fill="#fff0ea" stroke="#dfb8aa" stroke-width="2"/><text x="22" y="38" class="cardTitle">DeepSeek-V3（MoE）</text><text x="22" y="78" class="metric">≈ 22 / 400</text><text x="22" y="108" class="cardText">14.8T ÷ 671B 总参数 / 37B 激活参数</text><text x="22" y="132" class="cardText">MoE 必须同时报告两种比率</text></g>
    <g transform="translate(810 559)"><rect width="715" height="144" rx="21" fill="#f4eef4" stroke="#cbb8c9" stroke-width="2"/><text x="22" y="38" class="cardTitle">Qwen3-235B-A22B（MoE）</text><text x="22" y="78" class="metric">≈ 153 / 1,636 tokens/总参数／激活参数</text><text x="22" y="108" class="cardText">36T tokens；其中约 30T 通用阶段、约 5T 更高质量 STEM／代码／推理阶段，再进行长上下文训练。</text><text x="22" y="132" class="cardText">这不是 Chinchilla 被“推翻”，而是训练、推理、能力结构和数据可得性的目标函数改变。</text></g>
  </g>

  <text x="80" y="770" class="sans section">2026 年可操作的“数据规模”分层（经验口径，不是定律）</text>
  <g class="sans" filter="url(#shadow)">
    <rect x="70" y="806" width="260" height="65" rx="18" fill="#6d8982"/><text x="200" y="846" text-anchor="middle" class="band">1–10B｜领域继续预训练</text>
    <rect x="344" y="806" width="290" height="65" rx="18" fill="#4f7b73"/><text x="489" y="846" text-anchor="middle" class="band">10–100B｜小模型预训练</text>
    <rect x="648" y="806" width="290" height="65" rx="18" fill="#c08a3a"/><text x="793" y="846" text-anchor="middle" class="band">0.1–1T｜成熟开放基座</text>
    <rect x="952" y="806" width="270" height="65" rx="18" fill="#b65e49"/><text x="1087" y="846" text-anchor="middle" class="band">1–10T｜前沿级训练</text>
    <rect x="1236" y="806" width="294" height="65" rx="18" fill="#74566f"/><text x="1383" y="846" text-anchor="middle" class="band">&gt;10T｜超大规模语料工程</text>
  </g>
  <text x="80" y="907" class="sans small">数量级仅描述训练曝光 token。不同 tokenizer、语言、重复次数、合成比例和过滤强度会改变含义；原始池 240T 不等于模型实际训练 240T。</text>
</svg>
