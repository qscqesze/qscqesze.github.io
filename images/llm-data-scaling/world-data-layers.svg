<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">全球数据、公开网页、有效文本和大模型训练曝光量的分层比较</title>
  <desc id="desc">全球年度数据活动量以泽字节计，但其中只有很小一部分是可用于语言模型的公开人类文本。前沿模型公开训练 token 是曝光量，不能直接解释为唯一数据覆盖率。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf3"/><stop offset="1" stop-color="#edf6f3"/></linearGradient>
    <linearGradient id="global" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9a5d52"/><stop offset="1" stop-color="#c98666"/></linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2f625b"/><stop offset="1" stop-color="#559087"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#173f39" flood-opacity=".13"/></filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:42px;font-weight:760;fill:#203633}.subtitle{font-size:20px;fill:#5c6d69}.layerTitle{font-size:22px;font-weight:760;fill:#fff}.metric{font-size:31px;font-weight:820;fill:#fff}.layerText{font-size:17px;fill:#fff}.darkTitle{font-size:24px;font-weight:780;fill:#263f3a}.darkText{font-size:17px;fill:#536863}.small{font-size:15px;fill:#61726e}.ratio{font-size:26px;font-weight:810;fill:#9a4d3e}.model{font-size:17px;font-weight:720;fill:#2f4742}.note{font-size:16px;fill:#5b6d69}.formula{font-size:21px;font-weight:730;fill:#2d5953}
    </style>
  </defs>
  <rect width="1600" height="1040" rx="30" fill="url(#bg)"/>
  <text x="72" y="70" class="sans title">全球有多少数据？大模型已经“用掉”多少？</text>
  <text x="74" y="108" class="sans subtitle">必须依次区分年度数据活动量、网络流量、可抓取网页、有效公开文本与训练曝光 token；这些数值不能直接相除。</text>

  <g class="sans" filter="url(#shadow)">
    <rect x="65" y="150" width="990" height="146" rx="24" fill="url(#global)"/>
    <text x="94" y="187" class="layerTitle">全球年度数据活动量｜创建、采集、复制和消费，不是永久存量</text>
    <text x="94" y="236" class="metric">149 ZB（2024） → &gt;394 ZB（2028 预测）</text>
    <text x="94" y="272" class="layerText">2026 年可稳妥称为 200 ZB 以上数量级；包含视频、传感器流、日志、备份、私有数据和大量副本。</text>

    <rect x="105" y="325" width="910" height="122" rx="22" fill="#a97855"/>
    <text x="132" y="363" class="layerTitle">终端互联网流量｜同一内容可被传输无数次</text>
    <text x="132" y="411" class="metric">8.8 ZB（2025）</text>
    <text x="420" y="409" class="layerText">固定宽带 7.3 ZB + 移动宽带 1.5 ZB；这是流量，不是 8.8 ZB 唯一内容。</text>

    <rect x="145" y="476" width="830" height="126" rx="22" fill="#627f78"/>
    <text x="172" y="514" class="layerTitle">公开网页的一次可见切片｜Common Crawl，2025 年 12 月</text>
    <text x="172" y="562" class="metric">2.16B 网页 · 364 TiB 未压缩内容</text>
    <text x="172" y="588" class="layerText">覆盖 46M hosts；快照既不是整个互联网，也没有完成正文抽取、去重、授权和质量过滤。</text>

    <rect x="185" y="631" width="750" height="142" rx="22" fill="url(#text)"/>
    <text x="212" y="669" class="layerTitle">可训练的公开人类文本有效存量｜最接近 LLM 的分母</text>
    <text x="212" y="719" class="metric">约 300T tokens</text>
    <text x="535" y="716" class="layerText">90% 区间：100T–1,000T</text>
    <text x="212" y="751" class="layerText">已调整质量、重复和有限多 epoch；仍是情景估计，不是对互联网的逐字普查。</text>
  </g>

  <g class="sans" filter="url(#shadow)">
    <rect x="1090" y="150" width="445" height="623" rx="24" fill="#fff" stroke="#d5dfdc" stroke-width="2"/>
    <text x="1120" y="194" class="darkTitle">为什么不能回答“AI 用了 X% 世界数据”</text>
    <line x1="1120" y1="216" x2="1505" y2="216" stroke="#dce5e2" stroke-width="2"/>
    <circle cx="1132" cy="254" r="8" fill="#b66550"/><text x="1154" y="260" class="darkText">ZB 指年度字节活动，token 指文本切分；</text>
    <text x="1154" y="286" class="darkText">分母的对象和单位都不同。</text>
    <circle cx="1132" cy="330" r="8" fill="#b66550"/><text x="1154" y="336" class="darkText">D_seen 包含多 epoch、重采样和合成数据，</text>
    <text x="1154" y="362" class="darkText">不等于唯一人类文本。</text>
    <circle cx="1132" cy="406" r="8" fill="#b66550"/><text x="1154" y="412" class="darkText">不同模型高度复用同一网页、代码和书籍，</text>
    <text x="1154" y="438" class="darkText">不能把各模型训练 token 简单相加。</text>
    <circle cx="1132" cy="482" r="8" fill="#b66550"/><text x="1154" y="488" class="darkText">闭源模型通常不披露语料、重复率、</text>
    <text x="1154" y="514" class="darkText">合成比例和去重口径。</text>
    <rect x="1120" y="555" width="385" height="174" rx="18" fill="#edf6f3"/>
    <text x="1144" y="590" class="darkTitle">一个可审计的例子：DCLM</text>
    <text x="1144" y="632" class="ratio">240T → 2.6T</text>
    <text x="1144" y="662" class="darkText">原始池 tokens → 7B 模型训练曝光</text>
    <text x="1144" y="696" class="formula">名义采样比 ≈ 1.1%</text>
    <text x="1144" y="720" class="small">它仍不代表“全世界数据使用率”。</text>
  </g>

  <g class="sans" filter="url(#shadow)">
    <rect x="65" y="818" width="1470" height="150" rx="24" fill="#fff" stroke="#d4dfdb" stroke-width="2"/>
    <text x="92" y="855" class="darkTitle">本文公开模型的名义曝光量 ÷ 300T 有效文本存量（仅作数量级比较，不是唯一覆盖率）</text>
    <text x="110" y="910" class="model">Llama 3 405B</text><text x="277" y="910" class="ratio">15.6T / 300T ≈ 5.2%</text>
    <text x="570" y="910" class="model">DeepSeek-V3</text><text x="724" y="910" class="ratio">14.8T / 300T ≈ 4.9%</text>
    <text x="1010" y="910" class="model">Qwen3</text><text x="1090" y="910" class="ratio">36T / 300T ≈ 12%</text>
    <text x="92" y="947" class="note">真正覆盖率需要 D_unique ∩ 人类公开存量；公开报告没有提供这一交集。全球累计已用量截至 2026 年仍不可审计。</text>
  </g>
  <text x="72" y="1006" class="sans small">来源口径：Broadband Commission / ITU（全球数据活动与流量）、Common Crawl（网页快照）、Villalobos et al.（有效公开人类文本）；模型 token 来自各技术报告。</text>
</svg>
