<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
  window.qscVisitorStats = {
    endpoint: {{ site.visitor_stats.endpoint | default: "" | jsonify }},
    statsPage: "{{ base_path }}/stats/"
  };
</script>
<script type="module" src="{{ base_path }}/assets/js/visitor-stats.js"></script>

{% if page.visitor_globe %}
  {% if site.visitor_stats.endpoint %}
    <script defer src="https://cdn.jsdelivr.net/npm/globe.gl@2.46.1/dist/globe.gl.min.js"></script>
  {% endif %}
  <script defer src="{{ base_path }}/assets/js/visitor-globe.js"></script>
{% endif %}

{% include analytics.html %}
